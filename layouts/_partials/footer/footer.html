<footer class="site-footer">
    <section class="copyright">
        &copy;
        {{ if and (.Site.Params.footer.since) (ne .Site.Params.footer.since (int (now.Format "2006"))) }}
            {{ .Site.Params.footer.since }} –
        {{ end }}
        {{ now.Format "2006" }} {{ default .Site.Title .Site.Copyright }}
    </section>

    <section class="visitor-badges" aria-label="访客统计" data-visitor-badges>
        <span class="visitor-badge" data-metric="uv">
            <span class="visitor-badge__icon" aria-hidden="true">👣</span>
            <span class="visitor-badge__body">
                <span class="visitor-badge__value" id="busuanzi_value_site_uv" data-visitor-value>—</span>
                <span class="visitor-badge__label">位旅人路过</span>
            </span>
        </span>
        <span class="visitor-badge" data-metric="pv">
            <span class="visitor-badge__icon" aria-hidden="true">📖</span>
            <span class="visitor-badge__body">
                <span class="visitor-badge__value" id="busuanzi_value_site_pv" data-visitor-value>—</span>
                <span class="visitor-badge__label">次翻阅</span>
            </span>
        </span>
        <span class="visitor-badge visitor-badge--solo" data-metric="personal">
            <span class="visitor-badge__icon" aria-hidden="true" data-personal-icon>🌱</span>
            <span class="visitor-badge__phrase" data-personal-text>初次见面</span>
        </span>
    </section>
</footer>

<button class="back-to-top" type="button" aria-label="回到顶部" data-back-to-top>
    <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 19 L12 6 M6 12 L12 6 L18 12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="back-to-top__label">Top</span>
</button>

<script defer src="https://events.vercount.one/js"></script>

<script>
/* 阅读进度条（仅文章详情页） */
(function () {
    var article = document.querySelector('.main-article .article-content');
    if (!article) return;
    var bar = document.createElement('div');
    bar.className = 'reading-progress';
    document.body.appendChild(bar);
    var update = function () {
        var rect = article.getBoundingClientRect();
        var top = window.scrollY + rect.top;
        var height = rect.height;
        if (height <= 0) return;
        var scrolled = (window.scrollY + window.innerHeight * 0.5 - top) / height;
        var progress = Math.max(0, Math.min(1, scrolled));
        bar.style.transform = 'scaleX(' + progress + ')';
    };
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update, { passive: true });
    update();
})();

/* 个人徽章：基于 localStorage 的"距上次访问"，纯前端、立即显示 */
(function () {
    var iconEl = document.querySelector('[data-personal-icon]');
    var textEl = document.querySelector('[data-personal-text]');
    if (!iconEl || !textEl) return;

    var KEY = 'xiaobox_last_visit';
    var DAY = 86400000;
    var now = Date.now();
    var raw;
    try { raw = localStorage.getItem(KEY); } catch (_) { return; }

    var phrase, icon;
    var last = raw ? parseInt(raw, 10) : NaN;

    if (!raw || isNaN(last)) {
        icon = '🌱'; phrase = '初次见面';
    } else {
        var diff = now - last;
        // 日历日差：按本地 00:00 对齐，避免"刚过午夜被算 0 天"的尴尬
        var startOfDay = function (t) {
            var d = new Date(t);
            d.setHours(0, 0, 0, 0);
            return d.getTime();
        };
        var days = Math.round((startOfDay(now) - startOfDay(last)) / DAY);

        if (diff < 30 * 60 * 1000) { icon = '🫧'; phrase = '欢迎回来'; }
        else if (days === 0)      { icon = '☕'; phrase = '今天再见'; }
        else if (days === 1)      { icon = '🌅'; phrase = '昨天来过'; }
        else if (days <= 7)       { icon = '🌤'; phrase = days + ' 天前见过'; }
        else if (days <= 30)      { icon = '📆'; phrase = days + ' 天前来过'; }
        else if (days <= 180)     { icon = '✨'; phrase = '好久不见'; }
        else                      { icon = '🌌'; phrase = '久违的你'; }
    }

    iconEl.textContent = icon;
    textEl.textContent = phrase;

    var reveal = function () {
        var el = document.querySelector('[data-metric="personal"]');
        if (el) el.classList.add('is-ready');
    };
    /* 字体加载完成后再淡入，避免 fallback → 目标字体切换引起的宽度 shift */
    if (document.fonts && document.fonts.ready && document.fonts.ready.then) {
        document.fonts.ready.then(reveal);
        setTimeout(reveal, 1500); /* 超时兜底 */
    } else {
        reveal();
    }

    try { localStorage.setItem(KEY, String(now)); } catch (_) {}
})();

/* Back to Top：滚动超阈值显示，点击平滑回顶 */
(function () {
    var btn = document.querySelector('[data-back-to-top]');
    if (!btn) return;

    var threshold = 420;
    var visible = false;
    var ticking = false;

    var update = function () {
        var next = window.scrollY > threshold;
        if (next !== visible) {
            visible = next;
            btn.classList.toggle('is-visible', visible);
        }
        ticking = false;
    };

    window.addEventListener('scroll', function () {
        if (!ticking) {
            requestAnimationFrame(update);
            ticking = true;
        }
    }, { passive: true });
    update();

    btn.addEventListener('click', function () {
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' });
    });
})();

/* 访客徽章：监听不蒜子数字注入 → 滚动动画 → 整组淡入；失败则隐藏 */
(function () {
    var root = document.querySelector('[data-visitor-badges]');
    if (!root) return;
    var values = root.querySelectorAll('[data-visitor-value]');
    if (!values.length) return;

    var done = 0;
    var giveUp;

    var format = function (n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    };

    var countUp = function (el, target) {
        var duration = 900;
        var start = performance.now();
        var step = function (now) {
            var p = Math.min(1, (now - start) / duration);
            var eased = 1 - Math.pow(1 - p, 3);
            el.textContent = format(Math.floor(target * eased));
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = format(target);
        };
        requestAnimationFrame(step);
    };

    var markReady = function (el) {
        var badge = el.closest('.visitor-badge');
        if (badge) badge.classList.add('is-ready');
    };

    var consume = function (el) {
        if (el.getAttribute('data-ready')) return true;
        var raw = (el.textContent || '').trim();
        var num = parseInt(raw.replace(/[^\d]/g, ''), 10);
        if (!raw || isNaN(num)) return false;
        el.setAttribute('data-ready', '1');
        countUp(el, num);
        markReady(el);
        done++;
        if (done >= values.length) clearTimeout(giveUp);
        return true;
    };

    Array.prototype.forEach.call(values, function (el) {
        if (consume(el)) return;
        var mo = new MutationObserver(function () {
            if (consume(el)) mo.disconnect();
        });
        mo.observe(el, { childList: true, characterData: true, subtree: true });
    });

    /* 超时兜底：把拿不到数据的徽章单个 is-failed → display:none，不留空位 */
    giveUp = setTimeout(function () {
        Array.prototype.forEach.call(values, function (el) {
            if (el.getAttribute('data-ready')) return;
            var badge = el.closest('.visitor-badge');
            if (badge) badge.classList.add('is-failed');
        });
    }, 4500);
})();

/* 📦 盒子彩蛋：点击侧边栏 emoji 会喷出随机表情 */
(function () {
    var emoji = document.querySelector('.site-avatar .emoji');
    if (!emoji) return;

    var jets = ['🚀','🐛','💻','☕','🔥','🎉','⚡','🔮','🦀','🎯','✨','🌱','📚','🧠','🍜','🎧','🪄'];
    var clicks = 0;

    emoji.style.cursor = 'pointer';
    emoji.setAttribute('title', '点我一下试试');
    emoji.setAttribute('role', 'button');
    emoji.setAttribute('tabindex', '0');

    var trigger = function () {
        clicks++;
        emoji.classList.remove('wiggle');
        void emoji.offsetWidth;
        emoji.classList.add('wiggle');

        var jet = document.createElement('span');
        jet.className = 'emoji-jet';
        jet.textContent = jets[Math.floor(Math.random() * jets.length)];
        var rect = emoji.getBoundingClientRect();
        jet.style.left = (rect.left + rect.width / 2) + 'px';
        jet.style.top = (rect.top + rect.height / 2) + 'px';
        jet.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
        jet.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
        document.body.appendChild(jet);
        setTimeout(function () { jet.remove(); }, 1400);

        if (clicks === 10) {
            console.log(
                '%c📦 你找到了盒子彩蛋！\n谢谢你点了我 10 次 :)',
                'color: #4f46e5; font-size: 14px; font-weight: bold; padding: 4px 0;'
            );
        }
    };

    emoji.addEventListener('click', trigger);
    emoji.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); }
    });
})();
</script>
