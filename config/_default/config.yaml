baseurl: https://xiaobox.github.io/
languageCode: zh-cn
defaultContentLanguage: zh-cn
hasCJKLanguage: true
title: 小盒子的技术分享
theme: hugo-theme-stack
enableEmoji: true

# 站点描述(用于首页 meta description / og:description / RSS)
description: 小盒子的技术分享 - AI Infra、推理平台、RAG、Agent、Java、Redis、MySQL、云原生等技术折腾笔记。公众号「小盒子的技术分享」镜像归档。

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

services:
  rss:
    limit: 10

pagination:
  pagerSize: 10

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: img/avatar.svg

  footer:
    since: 2020
    customText: "由 Hugo + Stack 驱动"

  dateFormat:
    published: 2006-01-02
    lastUpdated: 2006-01-02 15:04 MST

  sidebar:
    emoji: "📦"
    subtitle: Java 老兵的 AI 折腾笔记
    avatar: img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: true
      default: 署名-非商业性使用-相同方式共享 4.0 国际 (CC BY-NC-SA 4.0)

  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: xiaobox/xiaobox.github.io
      repoID: R_kgDOSCIYtg
      category: Announcements
      categoryID: DIC_kwDOSCIYts4C6zwn
      mapping: pathname
      strict: 0
      lightTheme: light
      darkTheme: dark_dimmed
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: bottom
      lang: zh-CN
      loading: lazy

  widgets:
    homepage:
      - type: search
      - type: featured
        params:
          title: 精选文章
          pages:
            - /post/2025-03-28-ai-da-mo-xing-shi-dai-de-yan-jin-zhi-l-cong-ji-chu-mo-xing-r
            - /post/2025-03-11-rag-de-wu-da-fan-shi
            - /post/2025-02-09-deepseek-r1-cong-ling-kai-shi-dao-chao-yue-ren-lei
            - /post/2025-07-22-ai-quan-de-xin-chong-context-engineering
            - /post/2024-03-15-java-he-jvm-zi-jdk-8-zhi-21-de-te-xing-gai-lan
      - type: archives
        params:
          limit: 8
      - type: categories
        params:
          limit: 15
      - type: tag-cloud
        params:
          limit: 50
    page:
      - type: toc

  description: 小盒子的技术分享 - AI Infra、推理平台、RAG、Agent、Java、Redis、MySQL、云原生等技术折腾笔记
  keywords:
    - AI Infra
    - 推理平台
    - RAG
    - LLM
    - Agent
    - Claude Code
    - Cursor
    - Java
    - JVM
    - Redis
    - MySQL
    - 云原生
    - Kubernetes
    - 微服务
    - 架构
    - 公众号

  opengraph:
    twitter:
      card: summary_large_image

  defaultImage:
    opengraph:
      enabled: false
      local: false

  colorScheme:
    toggle: true
    default: auto

  imageProcessing:
    cover:
      enabled: false
    content:
      enabled: false

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: -100
      params:
        icon: home
    - identifier: about
      name: 关于
      url: /about/
      weight: -90
      params:
        icon: user
    - identifier: archives
      name: 归档
      url: /archives/
      weight: -80
      params:
        icon: archives
    - identifier: search
      name: 搜索
      url: /search/
      weight: -70
      params:
        icon: search
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/xiaobox
      params:
        icon: brand-github
    - identifier: email
      name: Email
      url: mailto:helongisno1@gmail.com
      params:
        icon: mail

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: false
    tabWidth: 4
